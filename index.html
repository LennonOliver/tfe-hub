<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFE Hub - Angular, NestJS & Prisma</title>
  
  <!-- Polices d'écriture épurées (Inter pour l'interface, Fira Code pour le code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* -------------------------------------------------------------
       VARIABLES DE DESIGN (Thème Monochrome Sombre Type Vercel)
       ------------------------------------------------------------- */
    :root {
      --bg-color: #000000;       /* Fond noir pur */
      --card-bg: #09090b;        /* Zinc 950 */
      --card-border: #27272a;    /* Zinc 800 (très fin) */
      --text-main: #ffffff;      /* Blanc pur */
      --text-muted: #a1a1aa;     /* Zinc 400 */
      --text-dark: #71717a;      /* Zinc 500 */
      --accent-cyan: #38bdf8;    /* Cyan discret pour surbrillances */
      --success-green: #10b981;  /* Émeraude pour validation */
      --error-red: #ef4444;      /* Rouge pour alertes */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Fira Code', monospace;
      --transition-speed: 0.2s;
    }

    /* -------------------------------------------------------------
       STYLES GLOBAUX ÉPURÉS
       ------------------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      padding-bottom: 60px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* -------------------------------------------------------------
       HEADER COLLANT MINIMALISTE (Barre de progression intégrée en bordure)
       ------------------------------------------------------------- */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--card-border);
      padding: 16px 0;
      position: relative;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
    }

    .app-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .progress-stats-top {
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }

    .progress-stats-top span {
      color: var(--text-main);
    }

    /* Barre de progression : ligne ultra-fine de 2px sous le header */
    .progress-bar-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: transparent;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background-color: #ffffff; /* Progression blanche sobre */
      transition: width 0.3s ease;
    }

    /* -------------------------------------------------------------
       NAVIGATION PAR SEMAINE (Lien plat, sans pilule)
       ------------------------------------------------------------- */
    .nav-tabs-wrapper {
      margin: 24px 0 16px 0;
      border-bottom: 1px solid var(--card-border);
    }

    .nav-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-speed);
      border-radius: 0;
    }

    .tab-button:hover {
      color: var(--text-main);
    }

    .tab-button.active {
      color: var(--text-main);
      border-bottom-color: var(--text-main);
      font-weight: 600;
    }

    /* En-tête de semaine */
    .week-header {
      margin-bottom: 20px;
    }

    .week-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .week-subtitle {
      font-size: 11px;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* -------------------------------------------------------------
       CARTES ACCORDÉONS (Design minimaliste sans arrondis excessifs)
       ------------------------------------------------------------- */
    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      transition: border-color var(--transition-speed);
      overflow: hidden;
      opacity: 0;
      transform: translateY(6px);
      animation: fadeInUp 0.3s ease forwards;
    }

    .card.validated {
      border-color: #3f3f46;
    }

    .card-summary-header {
      padding: 18px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      user-select: none;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-day-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .card.validated .card-day-badge {
      color: var(--success-green);
    }

    .card-expand-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dark);
    }

    .card-expand-indicator svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
      transition: transform var(--transition-speed);
    }

    .card.expanded .card-expand-indicator svg {
      transform: rotate(180deg);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .card-short-desc {
      font-size: 12.5px;
      color: var(--text-muted);
    }

    /* -------------------------------------------------------------
       ZONE DÉTAILS EXTENSIBLE
       ------------------------------------------------------------- */
    .card-details-wrapper {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-top: 1px solid transparent;
    }

    .card.expanded .card-details-wrapper {
      max-height: 3000px;
      border-top-color: var(--card-border);
    }

    .card-details-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Onglets de contenu interne */
    .details-tabs {
      display: flex;
      border-bottom: 1px solid var(--card-border);
      gap: 12px;
      overflow-x: auto;
    }

    .details-tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 8px 0;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-speed);
      border-radius: 0;
    }

    .details-tab-btn:hover {
      color: var(--text-main);
    }

    .details-tab-btn.active {
      color: var(--text-main);
      border-bottom-color: var(--text-main);
      font-weight: 600;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.15s ease-out;
    }

    .tab-content.active {
      display: block;
    }

    /* -------------------------------------------------------------
       ONGLET 1 : LE COURS (Riche, Documenté, Épuré)
       ------------------------------------------------------------- */
    .course-text {
      font-size: 13.5px;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .course-text p strong {
      color: var(--text-main);
    }

    .course-subtitle-internal {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 8px;
    }

    .course-list {
      margin-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .course-list li {
      font-size: 13px;
    }

    /* Tableaux épurés */
    .table-container {
      width: 100%;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid var(--card-border);
    }

    .doc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
    }

    .doc-table th, .doc-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--card-border);
    }

    .doc-table th {
      background-color: #121214;
      color: var(--text-main);
      font-weight: 600;
      border-bottom-width: 2px;
    }

    .doc-table tr:last-child td {
      border-bottom: none;
    }

    /* -------------------------------------------------------------
       ONGLET 2 : CODE & SCHÉMAS
       ------------------------------------------------------------- */
    .example-code-block {
      background-color: #040405;
      border: 1px solid var(--card-border);
      padding: 14px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 12px;
      color: #e4e4e7;
      white-space: pre;
      line-height: 1.4;
    }

    .diagram-container {
      margin-top: 14px;
      background-color: #040405;
      border: 1px solid var(--card-border);
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .diagram-svg {
      max-width: 100%;
      height: auto;
    }

    /* -------------------------------------------------------------
       ONGLET 3 : ACTIVITÉ INTERACTIVE
       ------------------------------------------------------------- */
    .activity-container {
      background-color: #040405;
      border: 1px solid var(--card-border);
      padding: 16px;
    }

    .activity-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .quiz-opt-btn {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 12px 14px;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition-speed);
      font-family: var(--font-sans);
      border-radius: 4px;
    }

    .quiz-opt-btn:hover {
      border-color: #ffffff;
      color: #ffffff;
    }

    .quiz-opt-btn.correct {
      background-color: rgba(16, 185, 129, 0.05);
      border-color: var(--success-green);
      color: var(--success-green);
    }

    .quiz-opt-btn.incorrect {
      background-color: rgba(239, 68, 68, 0.05);
      border-color: var(--error-red);
      color: var(--error-red);
    }

    .quiz-feedback {
      font-size: 12.5px;
      padding: 12px;
      border: 1px solid var(--card-border);
      background-color: var(--card-bg);
      display: none;
    }

    .quiz-feedback.success {
      border-color: rgba(16, 185, 129, 0.3);
      color: #34d399;
      display: block;
    }

    /* Sandbox CSS Flexbox */
    .flexbox-sandbox {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .flex-preview-area {
      height: 90px;
      background-color: #000000;
      border: 1px solid var(--card-border);
      display: flex;
      padding: 10px;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .flex-box-item {
      width: 32px;
      height: 32px;
      background-color: #ffffff;
      color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }

    .flex-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sandbox-select {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: var(--font-sans);
    }

    /* Simulator Zone Tactile (Angular/Bootstrap) */
    .comfort-simulator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .phone-screen-mockup {
      width: 140px;
      height: 240px;
      border: 4px solid #27272a;
      border-radius: 12px;
      background-color: #000000;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Simulation d'un header Bootstrap */
    .mock-bs-nav {
      background-color: #1e1e24;
      padding: 6px;
      font-size: 8px;
      font-weight: 600;
      border-bottom: 1px solid #2d2d34;
      text-align: center;
      color: #fff;
    }

    .mock-bs-body {
      flex: 1;
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .mock-bs-card {
      border: 1px solid #2d2d34;
      background-color: #09090b;
      padding: 8px;
      border-radius: 4px;
      font-size: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mock-bs-btn {
      padding: 4px 8px;
      background-color: #0d6efd; /* Bleu Bootstrap 5 */
      color: white;
      border-radius: 3px;
      font-size: 7px;
      text-align: center;
      width: fit-content;
      font-weight: 500;
    }

    .thumb-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transition: background-image 0.2s ease;
      z-index: 10;
    }

    .thumb-zone.right-hand {
      background: radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.35) 0%, rgba(16, 185, 129, 0.15) 50%, rgba(239, 68, 68, 0.15) 80%);
    }

    .thumb-zone.left-hand {
      background: radial-gradient(circle at 0% 100%, rgba(16, 185, 129, 0.35) 0%, rgba(16, 185, 129, 0.15) 50%, rgba(239, 68, 68, 0.15) 80%);
    }

    .phone-overlay-text {
      position: absolute;
      bottom: 2px;
      width: 100%;
      text-align: center;
      font-size: 7.5px;
      color: #666;
    }

    /* Bcrypt Simulator */
    .bcrypt-simulator {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bcrypt-input-row {
      display: flex;
      gap: 8px;
    }

    .bcrypt-input {
      flex: 1;
      background-color: #000000;
      border: 1px solid var(--card-border);
      padding: 10px;
      color: #fff;
      font-size: 13px;
      border-radius: 4px;
    }

    .bcrypt-input:focus {
      outline: none;
      border-color: #ffffff;
    }

    .bcrypt-btn {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 0 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color var(--transition-speed);
    }

    .bcrypt-btn:hover {
      background-color: #e4e4e7;
    }

    .bcrypt-result {
      font-family: var(--font-mono);
      font-size: 12px;
      background-color: #000000;
      padding: 10px;
      border: 1px dashed var(--card-border);
      word-break: break-all;
      min-height: 38px;
    }

    /* HTTP Response status (NestJS) */
    .http-simulator {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .http-response-view {
      background-color: #000000;
      border: 1px solid var(--card-border);
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 11.5px;
    }

    .http-status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 11px;
    }

    .status-2xx { background-color: rgba(16, 185, 129, 0.15); color: #34d399; }
    .status-4xx { background-color: rgba(239, 68, 68, 0.15); color: #f87171; }
    .status-5xx { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }

    /* -------------------------------------------------------------
       ONGLET 4 : TUTEUR IA
       ------------------------------------------------------------- */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 260px;
      background-color: #040405;
      border: 1px solid var(--card-border);
    }

    .chat-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12.5px;
      line-height: 1.4;
      animation: fadeInUp 0.15s ease forwards;
    }

    .chat-bubble.tutor {
      background-color: var(--card-bg);
      align-self: flex-start;
      border: 1px solid var(--card-border);
      color: #e4e4e7;
    }

    .chat-bubble.user {
      background-color: #ffffff;
      color: #000000;
      align-self: flex-end;
      font-weight: 500;
    }

    .chat-input-bar {
      display: flex;
      border-top: 1px solid var(--card-border);
      background-color: var(--card-bg);
    }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      padding: 12px;
      font-size: 12.5px;
      font-family: var(--font-sans);
    }

    .chat-input:focus {
      outline: none;
    }

    .chat-send-btn {
      background: none;
      border: none;
      color: #ffffff;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .chat-prompt-helper {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .btn-copy-prompt {
      background-color: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-speed);
      font-family: var(--font-sans);
    }

    .btn-copy-prompt:hover {
      border-color: #ffffff;
      color: #ffffff;
    }

    /* -------------------------------------------------------------
       PANNEAU DE VALIDATION
       ------------------------------------------------------------- */
    .card-footer-validation {
      padding: 12px 20px;
      background-color: #040405;
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: flex-end;
    }

    .validation-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .validation-checkbox {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkmark {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--card-border);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-speed);
      background-color: transparent;
    }

    .validation-label:hover .checkmark {
      border-color: #ffffff;
    }

    .validation-checkbox:checked ~ .checkmark {
      background-color: #ffffff;
      border-color: #ffffff;
    }

    .checkmark svg {
      width: 10px;
      height: 10px;
      fill: none;
      stroke: #000000;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transform: scale(0);
      transition: transform 0.15s ease;
    }

    .validation-checkbox:checked ~ .checkmark svg {
      transform: scale(1);
    }

    .validation-checkbox:checked ~ .validation-text {
      color: #ffffff;
    }

    /* -------------------------------------------------------------
       SECTION ACTIONS & COMPTEURS BAS
       ------------------------------------------------------------- */
    .actions-section {
      margin-top: 24px;
      border: 1px solid var(--card-border);
      background-color: var(--card-bg);
      border-radius: 6px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
    }

    .stat-box {
      background-color: #000000;
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 12px;
      text-align: center;
    }

    .stat-val {
      font-size: 17px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dark);
      text-transform: uppercase;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .btn-reset {
      background: none;
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-speed);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-reset:hover {
      background-color: rgba(239, 68, 68, 0.05);
      border-color: #ef4444;
    }

    footer {
      margin-top: 40px;
      padding: 24px 0;
      border-top: 1px solid var(--card-border);
      text-align: center;
      font-size: 11px;
      color: var(--text-dark);
    }

    /* -------------------------------------------------------------
       ANIMATIONS
       ------------------------------------------------------------- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:nth-child(1) { animation-delay: 0.02s; }
    .card:nth-child(2) { animation-delay: 0.04s; }

    /* -------------------------------------------------------------
       ÉTAT DE L'APPLICATION (Global State)
       ------------------------------------------------------------- */
    let currentWeekId = 1;
    let validatedSessions = new Set();
    const STORAGE_KEY = 'tfe_progress_sessions_v4'; // Clé v4 pour la nouvelle stack officielle

    /* -------------------------------------------------------------
       ÉLÉMENTS DU DOM
       ------------------------------------------------------------- */
    const navTabsContainer = document.getElementById('nav-tabs');
    const weekTitleEl = document.getElementById('week-title');
    const weekSubtitleEl = document.getElementById('week-subtitle');
    const cardsContainer = document.getElementById('cards-container');
    
    const progressBarFill = document.getElementById('progress-bar-fill');
    const progressStatsTop = document.getElementById('progress-stats-top');
    
    const statSessionsEl = document.getElementById('stat-sessions');
    const statHoursEl = document.getElementById('stat-hours');
    const btnReset = document.getElementById('btn-reset');

    /* -------------------------------------------------------------
       INITIALISATION
       ------------------------------------------------------------- */
    const init = () => {
      loadProgress();
      renderWeeksNav();
      switchWeek(1);
      updateGlobalProgress();
      btnReset.addEventListener('click', confirmResetProgress);
    };

    /* -------------------------------------------------------------
       PERSISTANCE LOCAL STORAGE
       ------------------------------------------------------------- */
    const loadProgress = () => {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          validatedSessions = new Set(JSON.parse(stored));
        }
      } catch (e) {
        console.error("Impossible de charger l'état local", e);
        validatedSessions = new Set();
      }
    };

    const saveProgress = () => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(validatedSessions)));
      } catch (e) {
        console.error("Impossible de sauvegarder l'état local", e);
      }
    };

    /* -------------------------------------------------------------
       RENDU NAVIGATION PAR SEMAINE
       ------------------------------------------------------------- */
    const renderWeeksNav = () => {
      navTabsContainer.innerHTML = '';
      WEEKS_DATA.forEach(week => {
        const btn = document.createElement('button');
        btn.className = `tab-button ${week.id === currentWeekId ? 'active' : ''}`;
        btn.id = `tab-btn-${week.id}`;
        btn.textContent = `Semaine ${week.id}`;
        btn.setAttribute('aria-selected', week.id === currentWeekId ? 'true' : 'false');
        btn.addEventListener('click', () => switchWeek(week.id));
        navTabsContainer.appendChild(btn);
      });
    };

    /* Basculer de semaine active */
    const switchWeek = (weekId) => {
      currentWeekId = weekId;
      
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
        btn.setAttribute('aria-selected', 'false');
      });
      
      const activeBtn = document.getElementById(`tab-btn-${weekId}`);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.setAttribute('aria-selected', 'true');
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }

      const weekData = WEEKS_DATA.find(w => w.id === weekId);
      if (weekData) {
        weekTitleEl.textContent = weekData.title;
        weekSubtitleEl.textContent = weekData.subtitle;
        renderCards(weekData.days);
      }
    };

       ------------------------------------------------------------- */

            <text x="18" y="48" fill="#ffffff" font-size="8" font-family="monospace">id_user (PK)</text>
            <text x="18" y="62" fill="#a1a1aa" font-size="8" font-family="monospace">email</text>
            <text x="18" y="76" fill="#a1a1aa" font-size="8" font-family="monospace">password</text>

            <line x1="110" y1="50" x2="220" y2="50" stroke="#27272a" stroke-width="1.5"/>
            <text x="126" y="44" fill="#ffffff" font-size="8" font-family="sans-serif">1,N</text>
            <text x="198" y="44" fill="#ffffff" font-size="8" font-family="sans-serif">1,1</text>

            <rect x="220" y="10" width="110" height="80" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
            <text x="275" y="26" fill="#ffffff" font-size="9" font-weight="700" text-anchor="middle" font-family="sans-serif">Commande</text>
            <line x1="220" y1="34" x2="330" y2="34" stroke="#27272a"/>
            <text x="228" y="48" fill="#ffffff" font-size="8" font-family="monospace">id_commande (PK)</text>
            <text x="228" y="62" fill="#a1a1aa" font-size="8" font-family="monospace">date_commande</text>
            <text x="228" y="76" fill="#ffffff" font-size="8" font-family="monospace">#id_user (FK)</text>
          </svg>
        `;
      } else if (type === "gitflow") {
        svgContent = `
          <svg class="diagram-svg" width="340" height="100" viewBox="0 0 340 100">
            <line x1="30" y1="30" x2="310" y2="30" stroke="#ffffff" stroke-width="2"/>
            <circle cx="50" cy="30" r="4" fill="#000000" stroke="#ffffff" stroke-width="2"/>
            <circle cx="290" cy="30" r="4" fill="#000000" stroke="#ffffff" stroke-width="2"/>
            <text x="320" y="33" fill="#ffffff" font-size="8" font-weight="700" font-family="sans-serif">main</text>

            <line x1="70" y1="70" x2="250" y2="70" stroke="#71717a" stroke-width="1.5"/>
            <circle cx="90" cy="70" r="4" fill="#000000" stroke="#71717a" stroke-width="1.5"/>
            <circle cx="230" cy="70" r="4" fill="#000000" stroke="#71717a" stroke-width="1.5"/>
            <text x="265" y="73" fill="#71717a" font-size="8" font-weight="700" font-family="sans-serif">develop</text>

            <path d="M 50 30 L 90 70" stroke="#27272a" stroke-dasharray="2"/>
            <path d="M 230 70 L 290 30" stroke="#27272a" stroke-dasharray="2"/>
          </svg>
        `;
      } else if (type === "jwt") {
        svgContent = `
          <svg class="diagram-svg" width="340" height="120" viewBox="0 0 340 120">
            <rect x="10" y="30" width="80" height="60" fill="#09090b" stroke="#27272a"/>
            <text x="50" y="62" fill="#ffffff" font-size="9" text-anchor="middle" font-family="sans-serif">Navigateur</text>
            <text x="50" y="76" fill="#a1a1aa" font-size="8" text-anchor="middle" font-family="monospace">LocalStorage</text>
            
            <line x1="90" y1="45" x2="230" y2="45" stroke="#ffffff" stroke-width="1.5"/>
            <polygon points="230,45 224,42 224,48" fill="#ffffff"/>
            <text x="160" y="38" fill="#ffffff" font-size="8" text-anchor="middle" font-family="sans-serif">Credentials</text>

            <rect x="230" y="30" width="100" height="60" fill="#09090b" stroke="#27272a"/>
            <text x="280" y="64" fill="#ffffff" font-size="9" text-anchor="middle" font-family="sans-serif">Serveur API</text>

            <line x1="230" y1="75" x2="98" y2="75" stroke="#71717a" stroke-width="1.5"/>
            <polygon points="90,75 96,72 96,78" fill="#71717a"/>
            <text x="160" y="88" fill="#71717a" font-size="8" text-anchor="middle" font-family="sans-serif">Token JWT</text>
          </svg>
        `;
      }
      
      if (!svgContent) return "";
      
      return `
        <div class="diagram-container">
          ${svgContent}
        </div>
      `;
    };

    /* -------------------------------------------------------------
       RENDU DES ACTIVITÉS INTERACTIVES
       ------------------------------------------------------------- */
    const renderActivity = (day) => {
      const act = day.activity;
      
      if (act && act.type === "quiz") {
        return `
          <div class="activity-container" id="act-box-${day.id}">
            <div class="activity-title">
              Activité de Validation : Quiz
            </div>
            <p style="font-size: 13px; margin-bottom: 12px; font-weight:500;">${act.question}</p>
            <div class="quiz-options">
              ${act.options.map((opt, i) => `
                <button class="quiz-opt-btn" onclick="validateQuizAnswer(this, '${day.id}', ${i}, ${act.correctIndex}, '${encodeURIComponent(act.explanation)}')">
                  ${opt}
                </button>
              `).join('')}
            </div>
            <div class="quiz-feedback" id="feedback-${day.id}"></div>
          </div>
        `;
      }
      
      return act ? act.html : `<p style="font-size: 12px; color: var(--text-dark);">Aucun exercice pour ce cours.</p>`;
    };

    /* Validation du Quiz */
    window.validateQuizAnswer = (btn, dayId, selected, correct, encodedExplanation) => {
      const feedbackBox = document.getElementById(`feedback-${dayId}`);
      const options = btn.parentElement.querySelectorAll('.quiz-opt-btn');
      const explanation = decodeURIComponent(encodedExplanation);
      
      options.forEach(b => b.disabled = true);
      
      if (selected === correct) {
        btn.classList.add('correct');
        feedbackBox.className = 'quiz-feedback success';
        feedbackBox.innerHTML = `<strong>Correct.</strong> ${explanation}`;
        
        const chk = document.getElementById(`chk-${dayId}`);
        if (chk && !chk.checked) {
          chk.checked = true;
          toggleSessionValidation(dayId);
        }
      } else {
        btn.classList.add('incorrect');
        options[correct].classList.add('correct');
        feedbackBox.className = 'quiz-feedback';
        feedbackBox.style.borderColor = 'rgba(239, 68, 68, 0.3)';
        feedbackBox.style.color = '#f87171';
        feedbackBox.style.display = 'block';
        feedbackBox.innerHTML = `<strong>Incorrect.</strong> ${explanation}`;
      }
    };

    /* -------------------------------------------------------------
       SIMULATEURS INTERACTIFS (SANDBOXES)
       ------------------------------------------------------------- */
    /* Zone tactile mobile (Angular + Bootstrap 5) */
    let isLeftHanded = false;
    window.toggleHand = (hand) => {
      const zone = document.getElementById('thumb-zone-sim');
      const alignContainer = document.getElementById('bs-btn-align');
      
      if (hand === 'left') {
        zone.className = "thumb-zone left-hand";
        alignContainer.style.justifyContent = 'flex-start';
        isLeftHanded = true;
      } else {
        zone.className = "thumb-zone right-hand";
        alignContainer.style.justifyContent = 'flex-end';
        isLeftHanded = false;
      }
    };

    /* HTTP status codes (NestJS Controller simulation) */
    window.runHttpSimulator = () => {
      const select = document.getElementById('http-status-select');
      const output = document.getElementById('http-response-output');
      const val = select.value;
      
      let badgeClass = "status-2xx";
      let codeSnippet = "";
      let httpResponse = "";
      
      if (val.startsWith("4")) badgeClass = "status-4xx";
      if (val.startsWith("5")) badgeClass = "status-5xx";
      
      if (val === "200") {
        codeSnippet = `@Get(':id')\nasync findOne(@Param('id') id: string) {\n  return this.courseService.findOne(+id);\n}`;
        httpResponse = "HTTP/1.1 200 OK\nContent-Type: application/json\n\n{\n  \"id\": 5,\n  \"title\": \"HTTP & REST dans NestJS\",\n  \"duration\": 45\n}";
      } else if (val === "201") {
        codeSnippet = `@Post()\n@HttpCode(201)\nasync create(@Body() createDto: CreateUserDto) {\n  return this.userService.create(createDto);\n}`;
        httpResponse = "HTTP/1.1 201 Created\nContent-Type: application/json\n\n{\n  \"id\": 42,\n  \"email\": \"etudiant@neon.tech\",\n  \"message\": \"User registered\"\n}";
      } else if (val === "400") {
        codeSnippet = `// Déclenché par la validation globale de NestJS :\n// app.useGlobalPipes(new ValidationPipe());\n\n@Post()\nasync create(@Body() createDto: CreateUserDto) { ... }`;
        httpResponse = "HTTP/1.1 400 Bad Request\nContent-Type: application/json\n\n{\n  \"statusCode\": 400,\n  \"message\": [\"email must be an email\", \"password must be longer than 8 characters\"],\n  \"error\": \"Bad Request\"\n}";
      } else if (val === "401") {
        codeSnippet = `@UseGuards(JwtAuthGuard)\n@Get('profile')\nasync getProfile(@Request() req) {\n  return req.user;\n}`;
        httpResponse = "HTTP/1.1 401 Unauthorized\nContent-Type: application/json\n\n{\n  \"statusCode\": 401,\n  \"message\": \"Token absent ou invalide\",\n  \"error\": \"Unauthorized\"\n}";
      } else if (val === "404") {
        codeSnippet = `// Erreur levée dans le service si Prisma renvoie null\nconst user = await this.prisma.user.findUnique({ where: { id } });\nif (!user) throw new NotFoundException('Utilisateur introuvable');`;
        httpResponse = "HTTP/1.1 404 Not Found\nContent-Type: application/json\n\n{\n  \"statusCode\": 404,\n  \"message\": \"Utilisateur introuvable\",\n  \"error\": \"Not Found\"\n}";
      } else if (val === "500") {
        codeSnippet = `// Erreur d'accès à PostgreSQL Neon.tech attrapée par l'ExceptionFilter :\n@Catch(QueryFailedError)\nexport class DatabaseExceptionFilter implements ExceptionFilter { ... }`;
        httpResponse = "HTTP/1.1 500 Internal Server Error\nContent-Type: application/json\n\n{\n  \"statusCode\": 500,\n  \"timestamp\": \"2026-06-29T15:08:00Z\",\n  \"message\": \"Erreur système de base de données PostgreSQL.\"\n}";
      }

      output.innerHTML = `
        <span class="http-status-badge ${badgeClass}">Code : ${val}</span>
        <div style="margin-top: 8px; font-weight: 700; font-size: 10px; color: var(--accent-cyan);">CODE CONTROLEUR NESTJS :</div>
        <pre style="margin-top: 4px; font-family: var(--font-mono); color: #818cf8; font-size:10px;">${codeSnippet}</pre>
        <div style="margin-top: 8px; font-weight: 700; font-size: 10px; color: var(--success-green);">REPONSE HTTP FLUX RE-EMIS :</div>
        <pre style="margin-top: 4px; font-family: var(--font-mono); color: #cbd5e1; font-size:10px;">${httpResponse}</pre>
      `;
    };

    /* Bcrypt (NestJS simulation) */
    window.runBcryptSimulator = () => {
      const pwd = document.getElementById('bcrypt-pwd').value;
      const output = document.getElementById('bcrypt-result-output');
      
      if (!pwd) {
        output.textContent = "Veuillez entrer un mot de passe.";
        return;
      }

      output.textContent = "Hachage asynchrone Bcrypt (cost = 12)...";
      
      setTimeout(() => {
        const fakeSalt = "R9h/cIPz9y.i68wNgE";
        const hash = `$2b$12$${fakeSalt}${Math.random().toString(36).substring(2, 15).padEnd(12, 'x')}`;
        output.innerHTML = `
          <strong style="color:var(--success-green);">Hash généré par HashService :</strong>
          <div style="margin-top: 4px; font-size:11px; color:#ffffff; font-family: var(--font-mono);">${hash}</div>
          <div style="font-size: 9.5px; color: var(--text-dark); margin-top: 4px;">
            Hachage salé stocké dans la colonne 'password' de votre table User via Prisma.
          </div>
        `;
      }, 150);
    };

    /* Flexbox */
    window.runFlexboxSimulator = () => {
      const dir = document.getElementById('flex-dir').value;
      const just = document.getElementById('flex-just').value;
      const preview = document.getElementById('flex-preview');
      
      if (preview) {
        preview.style.flexDirection = dir;
        preview.style.justifyContent = just;
        if (dir === 'column') {
          preview.style.height = '150px';
        } else {
          preview.style.height = '90px';
        }
      }
    };

    /* DOM Diffing */
    window.simulateDomDiff = () => {
      const realFlash = document.getElementById('real-dom-flash');
      const virtFlash = document.getElementById('virtual-dom-flash');
      
      if (realFlash && virtFlash) {
        realFlash.style.backgroundColor = '#b91c1c';
        realFlash.textContent = "RE-RENDU TOTAL !";
        
        virtFlash.style.backgroundColor = '#047857';
        virtFlash.textContent = "Seul le texte change !";
        
        setTimeout(() => {
          realFlash.style.backgroundColor = '#ef4444';
          realFlash.textContent = "Changement global";
          virtFlash.style.backgroundColor = '#10b981';
          virtFlash.textContent = "MàJ Ciblée";
        }, 1000);
      }
    };

    /* Recette UAT & Passation (W9-D3) */
    window.runUatSimulator = () => {
      const c1 = document.getElementById('uat-1').checked;
      const c2 = document.getElementById('uat-2').checked;
      const c3 = document.getElementById('uat-3').checked;
      const output = document.getElementById('uat-output');
      
      const count = (c1 ? 1 : 0) + (c2 ? 1 : 0) + (c3 ? 1 : 0);
      
      if (count === 3) {
        output.innerHTML = `
          <strong style="color:var(--success-green);">Passation Réussie : UAT validée !</strong>
          <div style="font-size:10px; color: var(--text-muted); margin-top:2px;">
            Propriété transférée au client (Vercel/Render/Neon ok) + cahier de recette signé.
          </div>
        `;
      } else {
        output.textContent = `Statut : ${count}/3 étapes de passation validées.`;
      }
    };

    /* -------------------------------------------------------------
       MOTEUR DE CHATBOT CONTEXTUEL LOCAL
       ------------------------------------------------------------- */
    window.handleChatKey = (event, dayId) => {
      if (event.key === 'Enter') {
        sendChatMsg(dayId);
      }
    };

    window.sendChatMsg = (dayId) => {
      const inputEl = document.getElementById(`chat-input-${dayId}`);
      const text = inputEl.value.trim();
      if (!text) return;
      
      const chatArea = document.getElementById(`chat-msg-${dayId}`);
      
      const userBubble = document.createElement('div');
      userBubble.className = "chat-bubble user";
      userBubble.textContent = text;
      chatArea.appendChild(userBubble);
      
      inputEl.value = "";
      chatArea.scrollTop = chatArea.scrollHeight;
      
      let activeDay = null;
      for (const week of WEEKS_DATA) {
        const found = week.days.find(d => d.id === dayId);
        if (found) {
          activeDay = found;
          break;
        }
      }

      const cleanText = text.toLowerCase();
      let responseText = "";

      if (activeDay && activeDay.aiResponses) {
        for (const key of Object.keys(activeDay.aiResponses)) {
          if (cleanText.includes(key)) {
            responseText = activeDay.aiResponses[key];
            break;
          }
        }
        
        if (!responseText) {
          responseText = `C'est une excellente question sur le cours « ${activeDay.topic} » sous la stack Angular / NestJS. Pour des explications personnalisées plus détaillées, copiez le prompt expert ci-dessous et envoyez-le à votre assistant IA Antigravity dans notre fil de discussion !`;
        }
      } else {
        responseText = "Impossible de charger le contexte du cours.";
      }

      setTimeout(() => {
        const tutorBubble = document.createElement('div');
        tutorBubble.className = "chat-bubble tutor";
        tutorBubble.textContent = responseText;
        chatArea.appendChild(tutorBubble);
        chatArea.scrollTop = chatArea.scrollHeight;
      }, 300);
    };

    window.copyAIPrompt = (dayId, topic) => {
      const promptText = `Agis en tant que Tuteur IA. Je suis en train de suivre la formation quotidienne du TFE Micro-Learning. Aujourd'hui nous étudions : "${topic}" (Identifiant : ${dayId}) avec la stack Angular, NestJS, Prisma et PostgreSQL (Neon.tech). Explique-moi plus en détail ce cours avec de nouvelles démonstrations concrètes en français.`;
      
      navigator.clipboard.writeText(promptText).then(() => {
        alert("Prompt expert copié ! Collez-le dans notre chat Antigravity pour me poser votre question.");
      }).catch(err => {
        console.error("Erreur de copie", err);
      });
    };

    /* -------------------------------------------------------------
       GESTION PROGRESSION & VALIDATION
       ------------------------------------------------------------- */
    window.toggleSessionValidation = (dayId) => {
      const chk = document.getElementById(`chk-${dayId}`);
      const card = document.getElementById(`card-${dayId}`);
      const valText = card.querySelector('.validation-text');
      
      if (chk.checked) {
        validatedSessions.add(dayId);
        card.classList.add('validated');
        valText.textContent = "Session Validée (45 min)";
      } else {
        validatedSessions.delete(dayId);
        card.classList.remove('validated');
        valText.textContent = "Valider la session (45 min)";
      }
      
      saveProgress();
      updateGlobalProgress();
    };

    const updateGlobalProgress = () => {
      const totalSessions = 45;
      const count = validatedSessions.size;
      const percentage = Math.round((count / totalSessions) * 100);
      
      // Update barre supérieure
      progressBarFill.style.width = `${percentage}%`;
      progressStatsTop.innerHTML = `<span>${count}</span> / ${totalSessions} validés`;
      
      // Update stats bas
      statSessionsEl.textContent = `${count} / ${totalSessions}`;
      
      // Heures cumulées (45m par session)
      const totalMinutes = count * 45;
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;
      
      if (hours > 0) {
        statHoursEl.textContent = `${hours}h ${mins > 0 ? mins + 'm' : ''}`;
      } else {
        statHoursEl.textContent = `${mins} min`;
      }
    };

    const confirmResetProgress = () => {
      const ask = confirm("Voulez-vous réinitialiser toute votre progression de micro-learning ?");
      if (ask) {
        validatedSessions.clear();
        saveProgress();
        updateGlobalProgress();
        switchWeek(currentWeekId);
      }
    };

    // Lancement de l'application
    document.addEventListener('DOMContentLoaded', init);

  </script>
</body>
</html>
